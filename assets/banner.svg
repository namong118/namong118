<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>

    <!-- Accent glow -->
    <radialGradient id="glow1" cx="25%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="40%" r="35%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom wave clip -->
    <clipPath id="clip">
      <rect width="900" height="280"/>
    </clipPath>

    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#a78bfa" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <!-- BG -->
    <rect width="900" height="280" fill="url(#bgGrad)"/>

    <!-- Glow blobs -->
    <ellipse cx="200" cy="140" rx="280" ry="200" fill="url(#glow1)" filter="url(#blur)"/>
    <ellipse cx="730" cy="110" rx="220" ry="160" fill="url(#glow2)" filter="url(#blur)"/>

    <!-- Grid lines (subtle) -->
    <g stroke="#a78bfa" stroke-opacity="0.06" stroke-width="1">
      <line x1="0" y1="70"  x2="900" y2="70"/>
      <line x1="0" y1="140" x2="900" y2="140"/>
      <line x1="0" y1="210" x2="900" y2="210"/>
      <line x1="150" y1="0" x2="150" y2="280"/>
      <line x1="450" y1="0" x2="450" y2="280"/>
      <line x1="750" y1="0" x2="750" y2="280"/>
    </g>

    <!-- Decorative circles -->
    <circle cx="820" cy="50"  r="60" fill="none" stroke="#a78bfa" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="820" cy="50"  r="40" fill="none" stroke="#a78bfa" stroke-opacity="0.08" stroke-width="1"/>
    <circle cx="80"  cy="230" r="50" fill="none" stroke="#60a5fa" stroke-opacity="0.10" stroke-width="1"/>
    <circle cx="80"  cy="230" r="30" fill="none" stroke="#60a5fa" stroke-opacity="0.07" stroke-width="1"/>

    <!-- Particle dots -->
    <circle cx="60"  cy="60"  r="2" fill="#a78bfa" opacity="0.5"/>
    <circle cx="200" cy="30"  r="1.5" fill="#60a5fa" opacity="0.6"/>
    <circle cx="380" cy="50"  r="2" fill="#a78bfa" opacity="0.4"/>
    <circle cx="560" cy="25"  r="1.5" fill="#f472b6" opacity="0.5"/>
    <circle cx="700" cy="55"  r="2" fill="#60a5fa" opacity="0.4"/>
    <circle cx="860" cy="160" r="1.5" fill="#a78bfa" opacity="0.5"/>
    <circle cx="40"  cy="180" r="2" fill="#60a5fa" opacity="0.35"/>
    <circle cx="480" cy="255" r="1.5" fill="#a78bfa" opacity="0.4"/>
    <circle cx="850" cy="240" r="2" fill="#f472b6" opacity="0.4"/>

    <!-- Code snippet decoration -->
    <text x="660" y="165" font-family="monospace" font-size="11" fill="#a78bfa" opacity="0.22">def ai_developer():</text>
    <text x="660" y="182" font-family="monospace" font-size="11" fill="#60a5fa" opacity="0.18">  skills = ["Unity","Python"]</text>
    <text x="660" y="199" font-family="monospace" font-size="11" fill="#f472b6" opacity="0.18">  return future</text>

    <!-- Divider line -->
    <line x1="64" y1="168" x2="520" y2="168" stroke="url(#bgGrad)" stroke-width="0"/>
    <rect x="64" y="167" width="200" height="1.5" rx="1" fill="#a78bfa" opacity="0.4"/>

    <!-- Bracket decoration -->
    <text x="40" y="120" font-family="monospace" font-size="52" fill="#a78bfa" opacity="0.08">{</text>
    <text x="850" y="240" font-family="monospace" font-size="52" fill="#60a5fa" opacity="0.06">}</text>

    <!-- Name -->
    <text
      x="64" y="140"
      font-family="'Segoe UI', 'Apple SD Gothic Neo', sans-serif"
      font-size="58"
      font-weight="800"
      fill="white"
      filter="url(#textShadow)"
      letter-spacing="-1"
    >박남영</text>

    <!-- Accent underline -->
    <rect x="64" y="150" width="190" height="3" rx="2" fill="#a78bfa" opacity="0.7"/>

    <!-- Subtitle -->
    <text
      x="66" y="195"
      font-family="'Segoe UI', 'Consolas', monospace"
      font-size="17"
      fill="#c4b5fd"
      opacity="0.85"
      letter-spacing="1"
    >Game Dev  →  AI Developer</text>

    <!-- Tags -->
    <!-- Tag 1 -->
    <rect x="64" y="215" width="72" height="24" rx="12" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
    <text x="100" y="231" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">Unity</text>

    <!-- Tag 2 -->
    <rect x="144" y="215" width="80" height="24" rx="12" fill="#60a5fa" fill-opacity="0.12" stroke="#60a5fa" stroke-opacity="0.35" stroke-width="1"/>
    <text x="184" y="231" font-family="monospace" font-size="11" fill="#93c5fd" text-anchor="middle">Unreal 5</text>

    <!-- Tag 3 -->
    <rect x="232" y="215" width="64" height="24" rx="12" fill="#f472b6" fill-opacity="0.12" stroke="#f472b6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="264" y="231" font-family="monospace" font-size="11" fill="#f9a8d4" text-anchor="middle">Python</text>

    <!-- Tag 4 -->
    <rect x="304" y="215" width="48" height="24" rx="12" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
    <text x="328" y="231" font-family="monospace" font-size="11" fill="#6ee7b7" text-anchor="middle">C#</text>

    <!-- Bottom wave -->
    <path d="M0 260 Q225 240 450 260 Q675 280 900 260 L900 280 L0 280 Z" fill="#a78bfa" opacity="0.06"/>
    <path d="M0 270 Q225 255 450 270 Q675 285 900 270 L900 280 L0 280 Z" fill="#a78bfa" opacity="0.04"/>
  </g>
</svg>
