<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="50%"  stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="50%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#a78bfa" flood-opacity="0.4"/>
    </filter>
    <filter id="eyeglow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#60a5fa" flood-opacity="0.9"/>
    </filter>
    <filter id="bodyglow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#a78bfa" flood-opacity="0.35"/>
    </filter>
    <clipPath id="circle">
      <circle cx="200" cy="200" r="200"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <circle cx="200" cy="200" r="200" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g clip-path="url(#circle)" stroke="#a78bfa" stroke-opacity="0.04" stroke-width="1">
    <line x1="0"   y1="80"  x2="400" y2="80"/>
    <line x1="0"   y1="160" x2="400" y2="160"/>
    <line x1="0"   y1="240" x2="400" y2="240"/>
    <line x1="0"   y1="320" x2="400" y2="320"/>
    <line x1="80"  y1="0"   x2="80"  y2="400"/>
    <line x1="160" y1="0"   x2="160" y2="400"/>
    <line x1="240" y1="0"   x2="240" y2="400"/>
    <line x1="320" y1="0"   x2="320" y2="400"/>
  </g>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="url(#ring)" stroke-width="3.5" opacity="0.85" filter="url(#shadow)"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.15"/>

  <!-- Particles -->
  <circle cx="115" cy="90"  r="3"   fill="#a78bfa" opacity="0.6"/>
  <circle cx="285" cy="75"  r="2"   fill="#60a5fa" opacity="0.55"/>
  <circle cx="340" cy="155" r="2.5" fill="#f472b6" opacity="0.5"/>
  <circle cx="72"  cy="290" r="2"   fill="#a78bfa" opacity="0.45"/>
  <circle cx="325" cy="315" r="3"   fill="#60a5fa" opacity="0.4"/>
  <circle cx="160" cy="350" r="2"   fill="#f472b6" opacity="0.45"/>
  <circle cx="240" cy="45"  r="1.5" fill="#a78bfa" opacity="0.5"/>

  <!-- ════════════════════════════════ -->
  <!--        PIXEL ROBOT               -->
  <!-- pixel size = 14px, origin = (116, 90) -->
  <!-- ════════════════════════════════ -->

  <!-- Antenna base -->
  <rect x="193" y="90" width="14" height="14" rx="2" fill="#a78bfa" filter="url(#bodyglow)"/>
  <!-- Antenna pole -->
  <rect x="200" y="74" width="4"  height="18" rx="2" fill="#7c5ff5"/>
  <!-- Antenna ball -->
  <circle cx="202" cy="70" r="7" fill="#a78bfa" filter="url(#eyeglow)"/>
  <circle cx="202" cy="70" r="3" fill="white" opacity="0.7"/>

  <!-- HEAD: 6×4 pixels (84×56) centred at 200 -->
  <!-- Row 1: _XXXX_ -->
  <rect x="144" y="104" width="14" height="14" rx="1" fill="#c4b5fd" filter="url(#bodyglow)"/>
  <rect x="158" y="104" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="172" y="104" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="186" y="104" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="200" y="104" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="214" y="104" width="14" height="14" rx="1" fill="#c4b5fd" filter="url(#bodyglow)"/>
  <!-- Row 2: X====X  (sides + inner) -->
  <rect x="130" y="118" width="14" height="14" rx="1" fill="#a78bfa"/>
  <rect x="144" y="118" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="158" y="118" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="172" y="118" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="186" y="118" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="200" y="118" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="214" y="118" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="228" y="118" width="14" height="14" rx="1" fill="#a78bfa"/>
  <!-- Eyes row -->
  <rect x="130" y="132" width="14" height="14" rx="1" fill="#a78bfa"/>
  <rect x="144" y="132" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <!-- Left eye -->
  <rect x="158" y="132" width="28" height="14" rx="2" fill="#60a5fa" filter="url(#eyeglow)"/>
  <rect x="161" y="135" width="8"  height="8"  rx="1" fill="white" opacity="0.85"/>
  <rect x="186" y="132" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <!-- Right eye -->
  <rect x="200" y="132" width="28" height="14" rx="2" fill="#60a5fa" filter="url(#eyeglow)"/>
  <rect x="203" y="135" width="8"  height="8"  rx="1" fill="white" opacity="0.85"/>
  <rect x="228" y="132" width="14" height="14" rx="1" fill="#a78bfa"/>
  <!-- Mouth row -->
  <rect x="130" y="146" width="14" height="14" rx="1" fill="#a78bfa"/>
  <rect x="144" y="146" width="14" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="158" y="146" width="14" height="14" rx="1" fill="#312e81"/>
  <!-- Mouth smile pixels -->
  <rect x="172" y="150" width="14" height="6"  rx="1" fill="#a78bfa"/>
  <rect x="186" y="153" width="14" height="6"  rx="1" fill="#a78bfa"/>
  <rect x="200" y="150" width="14" height="6"  rx="1" fill="#a78bfa"/>
  <rect x="214" y="146" width="14" height="14" rx="1" fill="#312e81"/>
  <rect x="228" y="146" width="14" height="14" rx="1" fill="#a78bfa"/>
  <!-- Head bottom -->
  <rect x="144" y="160" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="158" y="160" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="172" y="160" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="186" y="160" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="200" y="160" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="214" y="160" width="14" height="14" rx="1" fill="#c4b5fd"/>

  <!-- NECK -->
  <rect x="186" y="174" width="14" height="10" rx="1" fill="#7c5ff5"/>
  <rect x="200" y="174" width="14" height="10" rx="1" fill="#7c5ff5"/>

  <!-- BODY: 6×4 pixels -->
  <!-- Body top -->
  <rect x="144" y="184" width="14" height="14" rx="1" fill="#c4b5fd" filter="url(#bodyglow)"/>
  <rect x="158" y="184" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="172" y="184" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="186" y="184" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="200" y="184" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="214" y="184" width="14" height="14" rx="1" fill="#c4b5fd" filter="url(#bodyglow)"/>
  <!-- Body mid row 1 — chest panel -->
  <rect x="144" y="198" width="14" height="14" rx="1" fill="#a78bfa"/>
  <rect x="158" y="198" width="70" height="14" rx="2" fill="#1e1b4b"/>
  <!-- Chest LED -->
  <circle cx="179" cy="205" r="4" fill="#f472b6" filter="url(#eyeglow)"/>
  <circle cx="193" cy="205" r="4" fill="#60a5fa" filter="url(#eyeglow)"/>
  <circle cx="207" cy="205" r="4" fill="#a78bfa" filter="url(#eyeglow)"/>
  <rect x="228" y="198" width="14" height="14" rx="1" fill="#a78bfa"/>
  <!-- Body mid row 2 -->
  <rect x="144" y="212" width="14" height="14" rx="1" fill="#a78bfa"/>
  <rect x="158" y="212" width="70" height="14" rx="1" fill="#1e1b4b"/>
  <rect x="228" y="212" width="14" height="14" rx="1" fill="#a78bfa"/>
  <!-- Body bottom -->
  <rect x="144" y="226" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="158" y="226" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="172" y="226" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="186" y="226" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="200" y="226" width="14" height="14" rx="1" fill="#c4b5fd"/>
  <rect x="214" y="226" width="14" height="14" rx="1" fill="#c4b5fd"/>

  <!-- LEFT ARM -->
  <rect x="116" y="184" width="14" height="14" rx="1" fill="#7c5ff5"/>
  <rect x="116" y="198" width="14" height="14" rx="1" fill="#7c5ff5"/>
  <rect x="116" y="212" width="14" height="14" rx="1" fill="#7c5ff5"/>
  <!-- Left hand -->
  <rect x="102" y="205" width="14" height="14" rx="3" fill="#a78bfa"/>

  <!-- RIGHT ARM -->
  <rect x="242" y="184" width="14" height="14" rx="1" fill="#7c5ff5"/>
  <rect x="242" y="198" width="14" height="14" rx="1" fill="#7c5ff5"/>
  <rect x="242" y="212" width="14" height="14" rx="1" fill="#7c5ff5"/>
  <!-- Right hand -->
  <rect x="256" y="205" width="14" height="14" rx="3" fill="#a78bfa"/>

  <!-- LEGS -->
  <rect x="158" y="240" width="28" height="14" rx="1" fill="#7c5ff5"/>
  <rect x="200" y="240" width="28" height="14" rx="1" fill="#7c5ff5"/>
  <rect x="158" y="254" width="28" height="14" rx="1" fill="#7c5ff5"/>
  <rect x="200" y="254" width="28" height="14" rx="1" fill="#7c5ff5"/>
  <!-- Feet -->
  <rect x="151" y="268" width="42" height="10" rx="3" fill="#c4b5fd"/>
  <rect x="193" y="268" width="42" height="10" rx="3" fill="#c4b5fd"/>

  <!-- Bottom label -->
  <rect x="148" y="295" width="106" height="22" rx="11" fill="#a78bfa" fill-opacity="0.15" stroke="#a78bfa" stroke-opacity="0.4" stroke-width="1"/>
  <text x="201" y="310" font-family="'Consolas','Fira Code',monospace" font-size="11" font-weight="600" fill="#c4b5fd" text-anchor="middle" letter-spacing="1.5">namong118</text>

</svg>
